<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pro Trades V3.12 Voice Ask Instructor</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}iframe{width:100%;height:100%;border:0;display:block;background:#000}.loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#00d2ff;font-family:Arial,sans-serif;font-weight:900;letter-spacing:.08em;background:#000;z-index:2}.loading.hide{display:none}
</style>
</head>
<body>
<div class="loading" id="loading">LOADING V3.12 VOICE ASK...</div>
<iframe id="appFrame" src="chatgpt-version-3-11.html?v=e6cff9" allow="microphone"></iframe>
<script>
const frame=document.getElementById('appFrame');
const loading=document.getElementById('loading');
frame.addEventListener('load',()=>{
  try{
    const win=frame.contentWindow;
    const doc=frame.contentDocument;
    const style=doc.createElement('style');
    style.textContent=`
      .voiceAskRow{display:grid;grid-template-columns:1fr 56px;gap:8px;margin-top:10px;align-items:center}
      .voiceMic{height:48px;width:56px;border-radius:15px;border:1px solid rgba(0,210,255,.35);background:radial-gradient(circle at 50% 30%,rgba(0,210,255,.22),rgba(255,255,255,.045));color:#fff;font-size:23px;font-weight:1000;box-shadow:0 0 16px rgba(0,210,255,.18),inset 0 0 18px rgba(0,210,255,.08)}
      .voiceMic.listening{border-color:rgba(255,75,22,.75);color:#ff4b16;animation:voicePulse 1s ease-in-out infinite}
      @keyframes voicePulse{0%,100%{box-shadow:0 0 12px rgba(255,75,22,.2),inset 0 0 18px rgba(255,75,22,.08)}50%{box-shadow:0 0 28px rgba(255,75,22,.75),inset 0 0 22px rgba(255,75,22,.18)}}
      .voiceHint{margin-top:7px;font-size:11px;line-height:1.35;color:#9eb0c4}
    `;
    doc.head.appendChild(style);
    win.startInstructorMic=function(){
      const SpeechRecognition=win.SpeechRecognition||win.webkitSpeechRecognition||window.SpeechRecognition||window.webkitSpeechRecognition;
      const mic=doc.getElementById('voiceMicBtn');
      const hint=doc.getElementById('voiceHint');
      const aiAsk=doc.getElementById('aiAsk');
      if(!SpeechRecognition){
        if(hint)hint.textContent='Voice input is not available in this browser. Type the question instead.';
        if(win.openPanel)win.openPanel('Voice Input','Microphone speech input is not available in this browser. Type the question into Ask Instructor.');
        return;
      }
      const rec=new SpeechRecognition();
      rec.lang='en-US';
      rec.interimResults=false;
      rec.maxAlternatives=1;
      if(mic)mic.classList.add('listening');
      if(hint)hint.textContent='Listening... speak the repair question now.';
      rec.onresult=function(event){
        const transcript=event.results[0][0].transcript;
        if(aiAsk)aiAsk.value=transcript;
        if(hint)hint.textContent='Voice captured. Tap Ask Repair Instructor to get the guided answer.';
        if(win.toast)win.toast('Voice question captured',true);
      };
      rec.onerror=function(){
        if(hint)hint.textContent='Microphone could not capture. Try again or type the question.';
        if(win.toast)win.toast('Voice capture failed',true);
      };
      rec.onend=function(){if(mic)mic.classList.remove('listening')};
      rec.start();
    };
    function patchVoice(){
      const aiAsk=doc.getElementById('aiAsk');
      if(!aiAsk||doc.getElementById('voiceMicBtn'))return;
      let askBtn=null;
      const buttons=[...doc.querySelectorAll('button')];
      askBtn=buttons.find(b=>b.textContent.trim()==='Ask Repair Instructor');
      const row=doc.createElement('div');
      row.className='voiceAskRow';
      if(askBtn){askBtn.parentNode.insertBefore(row,askBtn);row.appendChild(askBtn)}
      else{aiAsk.insertAdjacentElement('afterend',row)}
      const mic=doc.createElement('button');
      mic.className='voiceMic';
      mic.id='voiceMicBtn';
      mic.title='Voice ask instructor';
      mic.textContent='🎙️';
      mic.onclick=()=>win.startInstructorMic();
      row.appendChild(mic);
      const hint=doc.createElement('div');
      hint.className='voiceHint';
      hint.id='voiceHint';
      hint.textContent='Tap the microphone, speak the issue, then tap Ask Repair Instructor.';
      row.insertAdjacentElement('afterend',hint);
    }
    patchVoice();
    const obs=new MutationObserver(patchVoice);
    obs.observe(doc.body,{childList:true,subtree:true});
    loading.classList.add('hide');
  }catch(e){loading.textContent='V3.12 loaded with voice patch error';console.error(e)}
});
</script>
</body>
</html>
