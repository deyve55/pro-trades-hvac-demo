<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Pro Trades Academy - HVAC Diagnostic OS</title>
<meta name="theme-color" content="#02070d">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{width:100%;min-height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}body{display:flex;justify-content:center}.phone{position:relative;width:100%;max-width:430px;min-height:100svh;background:#000;overflow:hidden;box-shadow:0 0 0 1px rgba(255,255,255,.06)}.visual{position:relative;width:100%;height:calc(min(100vw,430px)*1.75);min-height:100svh;overflow:hidden;background:#000}.visual iframe{position:absolute;inset:0;width:100%;height:100%;border:0;pointer-events:none;background:#000}.hotspot{position:absolute;border:0;background:transparent;color:transparent;cursor:pointer;border-radius:18px}.hotspot:active{background:rgba(255,91,21,.18);box-shadow:0 0 25px rgba(255,91,21,.55)}.scan{left:5%;top:53.5%;width:44%;height:7.1%;border-radius:14px}.hamburger{left:1%;top:35.6%;width:9%;height:6%}.bell{right:12%;top:35.3%;width:8%;height:6%}.profile{right:2%;top:35.3%;width:10%;height:6%;border-radius:999px}.nav{top:92.5%;height:7%;width:18%;border-radius:18px}.nav.home{left:0}.nav.scan-nav{left:20%}.nav.tools{left:40%}.nav.report{left:60%}.nav.present{left:80%}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(140%);width:min(390px,calc(100% - 24px));padding:12px 14px;border:1px solid rgba(0,174,255,.45);border-radius:16px;background:linear-gradient(135deg,rgba(6,13,20,.95),rgba(0,25,45,.95));box-shadow:0 0 32px rgba(0,174,255,.28);font-size:14px;line-height:1.35;transition:.28s ease;z-index:20}.toast.show{transform:translateX(-50%) translateY(0)}.toast b{color:#ff5b15}.sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(110%);width:min(430px,100%);padding:18px 16px 22px;border-radius:28px 28px 0 0;border:1px solid rgba(255,255,255,.12);background:linear-gradient(180deg,rgba(8,16,25,.98),rgba(2,7,13,.98));box-shadow:0 -20px 60px rgba(0,0,0,.75),0 0 40px rgba(0,174,255,.18);z-index:30;transition:.32s ease}.sheet.show{transform:translateX(-50%) translateY(0)}.grab{width:46px;height:5px;border-radius:999px;background:rgba(255,255,255,.28);margin:0 auto 14px}.sheet h2{font-size:21px;margin-bottom:6px}.sheet p{font-size:14px;color:rgba(255,255,255,.72);line-height:1.4;margin-bottom:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.chip{padding:12px;border-radius:16px;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.04)}.chip span{display:block;font-size:12px;color:#8ea0b4}.chip strong{display:block;margin-top:3px;font-size:18px}.actions{display:flex;gap:10px;margin-top:14px}.btn{flex:1;border:0;border-radius:14px;padding:12px 10px;font-weight:800;color:#fff;background:#ff4b16}.btn.secondary{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}.pulse{position:absolute;left:50%;top:14%;width:38%;aspect-ratio:1;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0}.pulse.run{animation:pulse 1.2s ease-out 2}@keyframes pulse{0%{opacity:.8;box-shadow:0 0 0 0 rgba(0,174,255,.45),0 0 0 0 rgba(255,75,22,.45)}100%{opacity:0;box-shadow:0 0 0 70px rgba(0,174,255,0),0 0 0 110px rgba(255,75,22,0)}}@media (min-width:431px){.visual{height:752px}.phone{margin:0 auto}}
</style>
</head>
<body>
<main class="phone" aria-label="Pro Trades Academy HVAC Diagnostic OS demo app">
  <section class="visual">
    <iframe src="visual-truth-preview.html" title="Approved Pro Trades HVAC OS app design"></iframe>
    <div class="pulse" id="pulse"></div>
    <button class="hotspot scan" onclick="openScan()" aria-label="Initiate Spatial Scan">scan</button>
    <button class="hotspot hamburger" onclick="toast('Main menu: projects, diagnostics, reports, client presentation mode.')" aria-label="Open menu">menu</button>
    <button class="hotspot bell" onclick="toast('<b>2 alerts</b><br>Manual J calculation ready. Duct layout packet generated.')" aria-label="Notifications">alerts</button>
    <button class="hotspot profile" onclick="toast('Technician profile: Pro Trades Academy demo operator.')" aria-label="Profile">profile</button>
    <button class="hotspot nav home" onclick="toast('Home dashboard active.')">home</button>
    <button class="hotspot nav scan-nav" onclick="openScan()">scan</button>
    <button class="hotspot nav tools" onclick="toast('Tools: Manual J, Manual S, Manual D, equipment parser, room measurements.')">tools</button>
    <button class="hotspot nav report" onclick="openReport()">report</button>
    <button class="hotspot nav present" onclick="toast('Client presentation mode ready: clean summary, load, sizing, duct recommendation.')">present</button>
  </section>
</main>
<div class="toast" id="toast"></div>
<section class="sheet" id="sheet" aria-live="polite">
  <div class="grab"></div>
  <h2 id="sheetTitle">Spatial Scan Started</h2>
  <p id="sheetText">LiDAR room mapping, ACCA Manual J thermal load, Manual S equipment match, and Manual D trunk sizing are being prepared for the client demo.</p>
  <div class="row">
    <div class="chip"><span>Space Volume</span><strong>11,264 cu. ft.</strong></div>
    <div class="chip"><span>Manual J Load</span><strong>34,200 BTU/h</strong></div>
    <div class="chip"><span>System Sizing</span><strong>2.5 Tons</strong></div>
    <div class="chip"><span>Duct Layout</span><strong>12-Inch Trunk</strong></div>
  </div>
  <div class="actions"><button class="btn secondary" onclick="closeSheet()">Close</button><button class="btn" onclick="toast('Client-ready diagnostic packet generated.')">Generate Report</button></div>
</section>
<script>
const toastBox=document.getElementById('toast'),sheet=document.getElementById('sheet'),pulse=document.getElementById('pulse');let toastTimer;
function toast(html){toastBox.innerHTML=html;toastBox.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toastBox.classList.remove('show'),2600)}
function openScan(){pulse.classList.remove('run');void pulse.offsetWidth;pulse.classList.add('run');document.getElementById('sheetTitle').textContent='Spatial Scan Started';document.getElementById('sheetText').textContent='Field intelligence is reading the room data, calculating load, matching equipment size, and preparing duct recommendations.';sheet.classList.add('show')}
function openReport(){document.getElementById('sheetTitle').textContent='Diagnostic Report Ready';document.getElementById('sheetText').textContent='Client-ready HVAC summary: 11,264 cubic feet, 34,200 BTU/h heating loss, 2.5 ton system sizing, 12-inch main trunk recommendation.';sheet.classList.add('show')}
function closeSheet(){sheet.classList.remove('show')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet()});
</script>
</body>
</html>
